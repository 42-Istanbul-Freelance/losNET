version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: losev-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    command: mongod --wiredTigerCacheSizeGB 0.25 --nojournal
    mem_limit: 256m
    memswap_limit: 384m
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: losev-api
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/losev-net
      - NODE_ENV=production
    volumes:
      - api_uploads:/usr/src/app/uploads
    mem_limit: 256m
    memswap_limit: 384m
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - frontend
      - backend

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VUE_APP_API_URL=/api
    container_name: losev-web
    mem_limit: 128m
    memswap_limit: 192m
    networks:
      - frontend

  nginx:
    image: nginx:alpine
    container_name: losev-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    mem_limit: 64m
    memswap_limit: 96m
    depends_on:
      - api
      - web
    networks:
      - frontend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  mongodb_data:
  api_uploads:
