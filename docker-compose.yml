version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: losev-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ./docker_data/mongodb:/data/db
    networks:
      - backend

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: losev-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/losev-net
    depends_on:
      - mongodb
    volumes:
      - ./server/uploads:/usr/src/app/uploads
    # Wait for mongo and run seeds before starting the server
    command: >
      sh -c "
      echo 'Waiting for mongodb...' &&
      sleep 5 &&
      echo 'Running seeds...' &&
      npm run seed:admin &&
      npm run seed:demo &&
      echo 'Starting API...' &&
      npm start"
    networks:
      - frontend
      - backend

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VUE_APP_API_URL=http://localhost:5000/api
    container_name: losev-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - api
    networks:
      - frontend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  mongo-data:
  upload-data:
