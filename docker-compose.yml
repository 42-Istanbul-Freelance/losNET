version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: losev-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - backend

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: losev-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/losev-net
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./server/uploads:/usr/src/app/uploads
    # Wait for mongo and run seeds before starting the server
    command: >
      sh -c "
      echo 'Waiting for mongodb...' &&
      echo 'Running seeds...' &&
      node scripts/seed-admin.js &&
      node scripts/seed-demo.js &&
      echo 'Starting API...' &&
      node server.js"
    networks:
      - frontend
      - backend

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VUE_APP_API_URL=http://localhost:5000/api
    container_name: losev-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - api
    networks:
      - frontend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  mongodb_data:


# Volumes are handled by local bind mounts in the services
