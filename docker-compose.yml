version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: losev-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    command: mongod --wiredTigerCacheSizeGB 0.25
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 })' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    networks:
      - backend

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: losev-api
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/losev-net
      - NODE_ENV=production
    volumes:
      - api_uploads:/usr/src/app/uploads
    depends_on:
      - mongodb
    networks:
      - frontend
      - backend

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VUE_APP_API_URL=/api
    container_name: losev-web
    networks:
      - frontend

  nginx:
    image: nginx:alpine
    container_name: losev-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - frontend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  mongodb_data:
  api_uploads:


# Volumes are handled by local bind mounts in the services
