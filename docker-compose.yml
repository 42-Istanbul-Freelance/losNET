version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: losev-monolith
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mongo-data:/data/db
      - upload-data:/app/server/uploads
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://127.0.0.1:27017/losev-net

volumes:
  mongo-data:
  upload-data:

networks:
  default:
    name: losev-net
