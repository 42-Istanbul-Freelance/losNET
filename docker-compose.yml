version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: losev-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: losev-net

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: losev-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/losev-net
    depends_on:
      - mongodb
    volumes:
      - ./server/uploads:/usr/src/app/uploads

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VUE_APP_API_URL=http://localhost:5000/api
    container_name: losev-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  mongo-data:
